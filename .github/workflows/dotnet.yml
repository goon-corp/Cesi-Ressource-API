name: .NET CI/CD

on:
  push:
    branches: [ "dev", "main" ]
  pull_request:
    branches: [ "dev", "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write # Nécessaire au niveau global pour que le job docker-push puisse publier sur GHCR

jobs:
  build-and-test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

    
      - name: Add GitHub NuGet source
        run: |
          dotnet nuget list source | grep -q "GitHub" && dotnet nuget remove source GitHub || true
          dotnet nuget add source "https://nuget.pkg.github.com/TitouanML/index.json" \
            --name "GitHub" \
            --username "TitouanML" \
            --password "${{ secrets.NUGET_PAT }}" \
            --store-password-in-clear-text

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install SonarScanner
        run: |
          if ! dotnet tool list -g | grep -q dotnet-sonarscanner; then
            dotnet tool install --global dotnet-sonarscanner
          fi
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Restore dependencies
        run: dotnet restore

      - name: Begin SonarQube analysis
        run: >
          dotnet sonarscanner begin
          /k:"cesizen-ressource"
          /d:sonar.host.url="${{ secrets.SONAR_HOST_URL }}"
          /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

      - name: Build
        run: dotnet build --no-restore

      - name: Test
        run: dotnet test --no-build --verbosity normal

      - name: TNR
        run: dotnet test --no-build --filter "Tnr"

      - name: End SonarQube analysis
        if: always()
        run: dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

  trivy-scan:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          severity: 'CRITICAL'
          exit-code: '1'

  docker-push:
    needs: [build-and-test, trivy-scan]
    runs-on: ubuntu-latest
    # La condition est ajustée pour s'exécuter sur tes deux branches de travail principales
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Lowercase image name
        run: echo "IMAGE_NAME=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
        
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest
            
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./Ressource-API
          file: ./Ressource-API/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Indispensable pour lier le secret de GitHub au Dockerfile
          secrets: |
            "NUGET_PAT=${{ secrets.NUGET_PAT }}"
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache,mode=max
